    <!-- Emergency cache reset (inline for reliability) -->
    <script>
      (function() {
        window.__APP_BOOTED__ = false;
        window.__APP_BOOTING__ = false;
        window.__BOOT_START__ = Date.now();
        
        async function resetCache() {
          var btn = event && event.target;
          if (btn) {
            btn.disabled = true;
            btn.textContent = 'Clearing...';
          }
          try {
            // Unregister all service workers
            if ('serviceWorker' in navigator) {
              var regs = await navigator.serviceWorker.getRegistrations();
              await Promise.all(regs.map(function(r) { return r.unregister(); }));
              console.log('[Recovery] Unregistered', regs.length, 'service worker(s)');
            }
            // Clear all caches
            if ('caches' in window) {
              var keys = await caches.keys();
              await Promise.all(keys.map(function(k) { return caches.delete(k); }));
              console.log('[Recovery] Deleted', keys.length, 'cache(s)');
            }
            // Clear PWA storage
            ['pwa-update-dismissed', 'pwa-install-dismissed'].forEach(function(k) {
              try { localStorage.removeItem(k); } catch(e) {}
            });
            console.log('[Recovery] Cache cleared. Reloading...');
          } catch (e) {
            console.error('[Recovery] Failed:', e);
          }
          // Clean reload without query params (avoids SW issues)
          location.replace(location.origin + location.pathname);
        }
        window.resetCache = resetCache;
        
        function showBootError(message, detail) {
          var errorDiv = document.getElementById('boot-error');
          var spinner = document.getElementById('boot-spinner');
          var msgEl = document.getElementById('boot-error-msg');
          var detailEl = document.getElementById('boot-error-detail');
          
          if (errorDiv) errorDiv.style.display = 'block';
          if (spinner) spinner.style.display = 'none';
          if (message && msgEl) msgEl.textContent = message;
          if (detail && detailEl) {
            detailEl.textContent = detail;
            detailEl.style.display = 'block';
          }
        }
        window.showBootError = showBootError;
        
        // Boot timeout - show error if app doesn't start within 15 seconds
        setTimeout(function() {
          if (!window.__APP_BOOTED__) {
            var elapsed = ((Date.now() - window.__BOOT_START__) / 1000).toFixed(1);
            console.error('[Recovery] App did not boot within 15 seconds');
            showBootError(
              'Application failed to initialize.',
              'Boot timeout after ' + elapsed + 's. Try resetting the cache.'
            );
          }
        }, 15000);
      })();
    </script>
