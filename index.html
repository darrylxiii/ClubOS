<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Quantum Club OS - Elite Career Management</title>
    <meta name="description" content="An invite-only executive members club operating system. Track your elite career opportunities, prepare for interviews, and access undisclosed high-impact roles." />
    <meta name="author" content="The Quantum Club" />
    
    <!-- Fonts - Async loading to prevent render blocking -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=optional" rel="stylesheet">
    
    <!-- Preload LCP image with explicit type for immediate discovery -->
    <link rel="preload" as="image" href="/quantum-logo.svg" type="image/svg+xml" fetchpriority="high">
    
    <!-- Preload critical font to prevent layout shift -->
    <link rel="preload" as="font" type="font/woff2" href="https://fonts.gstatic.com/s/inter/v20/UcC73FwrK3iLTeHuS_nVMrMxCp50SjIa1ZL7W0Q5nw.woff2" crossorigin>
    
    <!-- Module preload hint for critical JS - helps browser discover and download earlier -->
    <link rel="modulepreload" href="/src/main.tsx">
    
    <!-- Inline critical CSS hint for better performance -->
    <style>
      /* Critical above-the-fold styles to prevent CLS */
      /* Match fallback font metrics to Inter for minimal shift */
      @font-face {
        font-family: 'Inter-fallback';
        src: local('Arial');
        size-adjust: 107%;
        ascent-override: 90%;
        descent-override: 22%;
        line-gap-override: 0%;
      }
      
      body { 
        margin: 0; 
        font-family: Inter, 'Inter-fallback', system-ui, -apple-system, sans-serif;
        font-size: 16px;
        line-height: 1.5;
      }
      
      #root { 
        min-height: 100vh;
        position: relative;
        contain: layout style paint;
      }
      
      /* Prevent absolute elements from causing layout shifts */
      .absolute {
        will-change: auto;
      }
      
      /* Use optional display to eliminate layout shifts from fonts */
      @font-face {
        font-family: 'Inter';
        font-display: optional;
      }
    </style>

    <meta property="og:title" content="The Quantum Club OS - Elite Career Management" />
    <meta property="og:description" content="Invite-only career management system for visionary talent. Discreet. High-tech. Unapologetically exclusive." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@lovable_dev" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
